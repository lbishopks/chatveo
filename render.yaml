# Render Blueprint — deploys Chatveo as a web service with a persistent disk.
# In Render: New → Blueprint → connect your repo. Render reads this file.
services:
  - type: web
    name: chatveo
    runtime: node
    plan: starter            # "free" also works but sleeps when idle; starter stays awake
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    # Persistent disk so the SQLite database survives restarts/redeploys.
    disk:
      name: chatveo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATA_DIR
        value: /data
      - key: ADMIN_USER
        value: admin
      # Secrets — set these in the Render dashboard (sync:false = not stored in git):
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PREMIUM_PRICE_ID
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USER
        sync: false
      - key: TURN_PASS
        sync: false
