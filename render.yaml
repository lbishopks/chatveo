# Render Blueprint — Chatveo on the Starter plan with a persistent disk.
# The disk keeps the SQLite database (accounts, chat logs, payments, ads) alive
# across restarts and redeploys.
services:
  - type: web
    name: chatveo
    runtime: node
    plan: starter            # always-awake; required for a persistent disk
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    # Persistent disk mounted at /data; DATA_DIR points the DB there.
    disk:
      name: chatveo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATA_DIR
        value: /data
      - key: ADMIN_USER
        value: admin
      # Secrets — set in the Render dashboard (sync:false = not stored in git):
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PREMIUM_PRICE_ID
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USER
        sync: false
      - key: TURN_PASS
        sync: false
