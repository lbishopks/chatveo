# Render Blueprint — deploys Chatveo as a FREE web service ($0/mo).
# In Render: New → Blueprint → connect your repo. Render reads this file.
#
# NOTE: The free plan has NO persistent disk, so the SQLite database resets on
# each redeploy/restart. That's fine for testing. For a durable database later,
# switch `plan: free` -> `plan: starter` and add back a `disk:` block + DATA_DIR
# (that requires a paid instance).
services:
  - type: web
    name: chatveo
    runtime: node
    plan: free               # $0/mo; sleeps after ~15 min idle, wakes on first request
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ADMIN_USER
        value: admin
      # Secrets — set these in the Render dashboard (sync:false = not stored in git):
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PREMIUM_PRICE_ID
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USER
        sync: false
      - key: TURN_PASS
        sync: false
